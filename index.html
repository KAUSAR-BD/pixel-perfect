<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Pixel Perfect</title>
    <link rel="stylesheet" href="styles/main.css" />
  </head>
  <body>
    <section class="hero">
      <div class="container hero-layout">
        <div class="hero-content">
          <h1>Build Something Amazing</h1>
          <p>
            Create modern websites with clean design and perfect layout. Start
            your journey with simple and powerful tools
          </p>
          <a href="#" class="btn-primary">Get Started</a>
        </div>
        <div class="hero-media">
          <img src="images/pixel 1.jpg" alt="Hero Image" />
        </div>
      </div>
    </section>
    <!-- Gallery Section Using Bento Grid -->
    <section class="gallery">
      <div class="gallery-container">
        <div class="item" style="grid-area: item1">
          <img src="images/img1.jpg" alt="" />
        </div>
        <div class="item" style="grid-area: item2">
          <img src="images/img2.jpg" alt="" />
        </div>
        <div class="item" style="grid-area: item3">
          <img src="images/img3.jpg" alt="" />
        </div>
        <div class="item" style="grid-area: item4">
          <img src="images/img4.jpg" alt="" />
        </div>
        <div class="item" style="grid-area: item5">
          <img src="images/img5.jpg" alt="" />
        </div>
      </div>
    </section>
  </body>
</html>
